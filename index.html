<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <!-- App Stylesheet -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- ========== HEADER ========== -->
    <header class="app-header">
      <div class="header-brand">
        <span class="header-icon">🍃</span>
        <div class="header-text">
          <h1 class="app-title">Expense Tracker</h1>
          <p class="app-subtitle">Track your daily spending beautifully.</p>
        </div>
      </div>
      <div class="balance-card">
        <span class="balance-label">💰 Total Spent</span>
        <span class="balance-amount" id="totalBalance">Rp 0</span>
      </div>
    </header>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="app-main">

      <!-- ---------- INPUT FORM ---------- -->
      <section class="form-section" aria-labelledby="formHeading">
        <h2 id="formHeading" class="section-title">➕ Add Transaction</h2>

        <form id="expenseForm" novalidate>

          <div class="form-group">
            <label for="itemName">Item Name</label>
            <input
              type="text"
              id="itemName"
              name="itemName"
              placeholder="e.g. Lunch, Bus ticket…"
              autocomplete="off"
              required
            />
          </div>

          <div class="form-group">
            <label for="itemAmount">Amount (Rp)</label>
            <input
              type="number"
              id="itemAmount"
              name="itemAmount"
              placeholder="e.g. 25000"
              min="1"
              required
            />
          </div>

          <div class="form-group">
            <label for="itemCategory">Category</label>
            <select id="itemCategory" name="itemCategory" required>
              <option value="" disabled selected>Select a category</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚌 Transport</option>
              <option value="Fun">🎉 Fun</option>
            </select>
          </div>

          <button type="submit" class="btn-add">
            <span class="btn-add-icon">+</span>
            Add Transaction
          </button>

        </form>
      </section>

      <!-- ---------- DASHBOARD (list + chart) ---------- -->
      <div class="dashboard">

        <!-- Transaction List -->
        <section class="list-section" aria-labelledby="listHeading">
          <h2 id="listHeading" class="section-title">🧾 Transactions</h2>

          <!-- Shown when there are no transactions yet -->
          <div class="empty-state" id="emptyState">
            <span class="empty-icon">🍃</span>
            <p class="empty-title">No expenses yet.</p>
            <p class="empty-sub">Start tracking your spending today!</p>
          </div>

          <ul class="transaction-list" id="transactionList" aria-live="polite">
            <!-- Transaction items injected by script.js -->
          </ul>
        </section>

        <!-- Pie Chart -->
        <section class="chart-section" aria-labelledby="chartHeading">
          <h2 id="chartHeading" class="section-title">📊 Spending by Category</h2>

          <!-- Shown when there is no data for the chart -->
          <div class="empty-state" id="chartEmptyState">
            <span class="empty-icon">📊</span>
            <p class="empty-title">Your spending insights will appear here.</p>
            <p class="empty-sub">Add your first expense to begin.</p>
          </div>

          <div class="chart-wrapper">
            <canvas id="expenseChart" role="img" aria-label="Pie chart of spending by category"></canvas>
          </div>
        </section>

      </div><!-- /.dashboard -->

    </main><!-- /.app-main -->

    <!-- App Script (deferred so DOM is ready) -->
    <script src="js/script.js"></script>

  </body>
</html>
